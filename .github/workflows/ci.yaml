name: Build and Push Docker Image

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t xabiere15/java-login-app:${{ github.sha }} \
            -t xabiere15/java-login-app:latest \
            ./App 

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: xabiere15/java-login-app:${{ github.sha }}
          scan-type: 'image'
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Push Docker image
        run: |
          docker push xabiere15/java-login-app:${{ github.sha }}
          docker push xabiere15/java-login-app:latest